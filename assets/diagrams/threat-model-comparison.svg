<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');

    :root {
      --bg: #ffffff;
      --bg-subtle: #f8fafc;
      --border: #e2e8f0;
      --border-subtle: #f1f5f9;
      --text: #0f172a;
      --text-secondary: #334155;
      --text-muted: #94a3b8;
      --accent: #0f172a;
      --accent-secondary: #2563eb;
      --accent-green: #059669;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --bg-subtle: #1e293b;
        --border: #334155;
        --border-subtle: #1e293b;
        --text: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #64748b;
        --accent: #f1f5f9;
        --accent-secondary: #60a5fa;
        --accent-green: #34d399;
      }
    }

    .title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; fill: var(--text); }
    .subtitle { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; fill: var(--text-secondary); }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 500; fill: var(--text-secondary); }
    .body { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; fill: var(--text); }
    .body-sm { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; fill: var(--text-muted); }
    .caption { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; fill: var(--text-muted); }
    .header { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; fill: var(--text-secondary); letter-spacing: 0.8px; text-transform: uppercase; }
    .tag { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; fill: var(--text-secondary); letter-spacing: 0.5px; text-transform: uppercase; }
  </style>

  <rect width="880" height="560" fill="var(--bg)"/>

  <!-- Title -->
  <text x="440" y="40" class="title" text-anchor="middle">The Structure of the Threat Model Changes — Not Just the Threats</text>
  <line x1="120" y1="56" x2="760" y2="56" stroke="var(--border-subtle)" stroke-width="1"/>

  <!-- Divider between columns -->
  <line x1="440" y1="68" x2="440" y2="510" stroke="var(--border-subtle)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ========== LEFT: TRADITIONAL ========== -->
  <text x="220" y="92" class="header" text-anchor="middle">Traditional Threat Model</text>

  <!-- Network box -->
  <rect x="60" y="112" width="140" height="36" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="130" y="135" class="body" text-anchor="middle">Network</text>

  <!-- Source Code box -->
  <rect x="60" y="164" width="140" height="36" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="130" y="187" class="body" text-anchor="middle">Source Code</text>

  <!-- Arrows to Application (curved) -->
  <path d="M 200 130 Q 230 135 260 142" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="255,138 265,142 255,146" fill="var(--accent)"/>

  <path d="M 200 182 Q 230 172 260 158" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="255,160 265,156 255,152" fill="var(--accent)"/>

  <!-- Application box (filled — key element) -->
  <rect x="260" y="138" width="110" height="64" rx="6" fill="var(--accent)"/>
  <text x="315" y="164" class="body" text-anchor="middle" fill="#ffffff">Application</text>
  <text x="315" y="182" class="body-sm" text-anchor="middle" fill="#94a3b8">Attack surface</text>

  <!-- Arrow to Data -->
  <line x1="315" y1="202" x2="315" y2="228" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="311,223 315,233 319,223" fill="var(--accent)"/>

  <!-- Data cylinder -->
  <ellipse cx="315" cy="258" rx="44" ry="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="271" y="258" width="88" height="30" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <ellipse cx="315" cy="288" rx="44" ry="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="315" y="278" class="body" text-anchor="middle">Data</text>

  <!-- Coverage note -->
  <rect x="70" y="315" width="290" height="48" rx="8" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="215" y="336" class="label" text-anchor="middle">Threat model covers 2 surfaces:</text>
  <text x="215" y="354" class="body" text-anchor="middle">Network + Source Code</text>

  <!-- ========== RIGHT: AGENTIC ========== -->
  <text x="660" y="92" class="header" text-anchor="middle">Agentic Threat Model</text>

  <!-- 7 layers — single hue, varying weight -->
  <!-- Layer 1: Foundation Models (darkest) -->
  <rect x="470" y="112" width="300" height="34" rx="6" fill="var(--accent)"/>
  <text x="620" y="134" class="body" text-anchor="middle" fill="#ffffff">Foundation Models</text>

  <!-- Arrow down -->
  <line x1="620" y1="146" x2="620" y2="156" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,152 620,160 624,152" fill="var(--text-muted)"/>

  <!-- Layer 2: Data Operations -->
  <rect x="470" y="156" width="300" height="34" rx="6" fill="var(--text-secondary)"/>
  <text x="620" y="178" class="body" text-anchor="middle" fill="#ffffff">Data Operations</text>

  <line x1="620" y1="190" x2="620" y2="200" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,196 620,204 624,196" fill="var(--text-muted)"/>

  <!-- Layer 3: Agent Frameworks -->
  <rect x="470" y="200" width="300" height="34" rx="6" fill="var(--border)"/>
  <text x="620" y="222" class="body" text-anchor="middle">Agent Frameworks</text>

  <line x1="620" y1="234" x2="620" y2="244" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,240 620,248 624,240" fill="var(--text-muted)"/>

  <!-- Layer 4: Deployment Infrastructure -->
  <rect x="470" y="244" width="300" height="34" rx="6" fill="var(--border-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="620" y="266" class="body" text-anchor="middle">Deployment Infrastructure</text>

  <line x1="620" y1="278" x2="620" y2="288" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,284 620,292 624,284" fill="var(--text-muted)"/>

  <!-- Layer 5: Evaluation &amp; Observability -->
  <rect x="470" y="288" width="300" height="34" rx="6" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="620" y="310" class="body" text-anchor="middle">Evaluation &amp; Observability</text>

  <line x1="620" y1="322" x2="620" y2="332" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,328 620,336 624,328" fill="var(--text-muted)"/>

  <!-- Layer 6: Security &amp; Compliance -->
  <rect x="470" y="332" width="300" height="34" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="620" y="354" class="body" text-anchor="middle">Security &amp; Compliance</text>

  <line x1="620" y1="366" x2="620" y2="376" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="616,372 620,380 624,372" fill="var(--text-muted)"/>

  <!-- Layer 7: Agent Ecosystem -->
  <rect x="470" y="376" width="300" height="34" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="620" y="398" class="body" text-anchor="middle">Agent Ecosystem</text>

  <!-- Feedback loop (curved, on the left side of the stack) -->
  <path d="M 470 393 Q 410 393 410 129 Q 410 129 470 146" fill="none" stroke="var(--accent-green)" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="465,142 473,146 465,150" fill="var(--accent-green)"/>

  <!-- Feedback label -->
  <rect x="360" y="250" width="72" height="40" rx="8" fill="var(--bg-subtle)" stroke="var(--accent-green)" stroke-width="1"/>
  <text x="396" y="268" class="label" text-anchor="middle" fill="var(--accent-green)">Cross-layer</text>
  <text x="396" y="282" class="label" text-anchor="middle" fill="var(--accent-green)">attack paths</text>

  <!-- Coverage note -->
  <rect x="470" y="425" width="300" height="48" rx="8" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="620" y="446" class="label" text-anchor="middle">Threat model covers 7 interacting layers</text>
  <text x="620" y="464" class="body" text-anchor="middle">+ cross-layer attack paths</text>

  <!-- Caption -->
  <text x="440" y="520" class="caption" text-anchor="middle">The feedback loop from Agent Ecosystem back to Foundation Models captures how threats propagate through the entire stack.</text>
</svg>
