<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <style>
    /* Font properties only. fill is set per element as a presentation attribute. */
    .title   { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:20px; font-weight:700; }
    .body    { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; font-weight:600; }
    .sub     { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; font-weight:400; }
    .mono    { font-family: 'Courier New',Courier,monospace; font-size:9px; font-weight:500; letter-spacing:0.06em; }
    .caption { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; font-weight:400; }
    .legend  { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-threat" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c2410c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" class="title" fill="#0f172a">MCP Supply Chain Attack: 5-Step Chain</text>
  <line x1="40" y1="56" x2="860" y2="56" stroke="#f1f5f9" stroke-width="1"/>

  <!--
    Box sizing (formula: top_pad=10 + badge_h=14 + badge_gap=10 + title_lines*18 + body_lines*16 + bottom_pad=12)
    Steps 1-3: badge + 1 title + 2 body = 10+14+10+18+32+12 = 96px
    Steps 4-5: badge + 2 title + 2 body = 10+14+10+36+32+12 = 114px
    All boxes top at y=80, so bottoms are at y=176 (steps 1-3) and y=194 (steps 4-5).
    To align, use height=114 for all boxes.

    Canvas 900px, 5 boxes at 140px with 32px gaps:
    5*140 + 4*32 = 700 + 128 = 828px + 2*36px margins = 900px. Fits.

    Layout:
      Step 1: x=36,  cx=106
      Step 2: x=208, cx=278
      Step 3: x=380, cx=450
      Step 4: x=552, cx=622
      Step 5: x=724, cx=794
  -->

  <!-- ARROWS (drawn before boxes so boxes sit on top) -->
  <line x1="176" y1="137" x2="208" y2="137" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="348" y1="137" x2="380" y2="137" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="137" x2="552" y2="137" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-threat)"/>
  <line x1="692" y1="137" x2="724" y2="137" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==============================================-
       STEP 1  ==  Malicious MCP Server (white box)
       box: x=36 y=80 w=140 h=114
       badge at y=90, badge text y=101
       title_1 at y=128
       body_1 at y=156, body_2 at y=172
       box_bottom=194  (all baselines < 190 == OK)
       ==============================================- -->
  <rect x="36" y="80" width="140" height="114" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="48" y="90" width="36" height="14" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <text x="66" y="101" text-anchor="middle" class="mono" fill="#64748b">STEP 1</text>
  <text x="106" y="128" text-anchor="middle" class="body" fill="#0f172a">Malicious MCP</text>
  <text x="106" y="146" text-anchor="middle" class="body" fill="#0f172a">Server</text>
  <text x="106" y="166" text-anchor="middle" class="sub" fill="#334155">Publishes tool with</text>
  <text x="106" y="182" text-anchor="middle" class="sub" fill="#334155">hidden payload</text>
  <text x="106" y="216" text-anchor="middle" class="mono" fill="#64748b">AGENT ECOSYSTEM</text>

  <!-- ==============================================-
       STEP 2  ==  Description Payload (white box)
       box: x=208 y=80 w=140 h=114, bottom=194
       ==============================================- -->
  <rect x="208" y="80" width="140" height="114" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="220" y="90" width="36" height="14" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <text x="238" y="101" text-anchor="middle" class="mono" fill="#64748b">STEP 2</text>
  <text x="278" y="128" text-anchor="middle" class="body" fill="#0f172a">Description</text>
  <text x="278" y="146" text-anchor="middle" class="body" fill="#0f172a">Payload</text>
  <text x="278" y="166" text-anchor="middle" class="sub" fill="#334155">Instruction hidden in</text>
  <text x="278" y="182" text-anchor="middle" class="sub" fill="#334155">natural language</text>
  <text x="278" y="216" text-anchor="middle" class="mono" fill="#64748b">FRAMEWORK</text>

  <!-- ==============================================-
       STEP 3  ==  Model Loads Context (white box)
       box: x=380 y=80 w=140 h=114, bottom=194
       ==============================================- -->
  <rect x="380" y="80" width="140" height="114" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="392" y="90" width="36" height="14" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="101" text-anchor="middle" class="mono" fill="#64748b">STEP 3</text>
  <text x="450" y="128" text-anchor="middle" class="body" fill="#0f172a">Model Loads</text>
  <text x="450" y="146" text-anchor="middle" class="body" fill="#0f172a">Context</text>
  <text x="450" y="166" text-anchor="middle" class="sub" fill="#334155">Payload enters</text>
  <text x="450" y="182" text-anchor="middle" class="sub" fill="#334155">operational context</text>
  <text x="450" y="216" text-anchor="middle" class="mono" fill="#64748b">FOUNDATION MODEL</text>

  <!-- ==============================================-
       STEP 4  ==  Model Follows Instruction (dark box)
       box: x=552 y=80 w=140 h=114, bottom=194
       ==============================================- -->
  <rect x="552" y="80" width="140" height="114" rx="6" fill="#0f172a"/>
  <rect x="564" y="90" width="36" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="582" y="101" text-anchor="middle" class="mono" fill="#ffffff">STEP 4</text>
  <text x="622" y="128" text-anchor="middle" class="body" fill="#ffffff">Model Follows</text>
  <text x="622" y="146" text-anchor="middle" class="body" fill="#ffffff">Instruction</text>
  <text x="622" y="166" text-anchor="middle" class="sub" fill="#ffffff">Treats injected text</text>
  <text x="622" y="182" text-anchor="middle" class="sub" fill="#ffffff">as operational guidance</text>
  <text x="622" y="216" text-anchor="middle" class="mono" fill="#64748b">MODEL LAYER</text>

  <!-- ==============================================-
       STEP 5  ==  Data Exfiltration (dark box)
       box: x=724 y=80 w=140 h=114, bottom=194
       ==============================================- -->
  <rect x="724" y="80" width="140" height="114" rx="6" fill="#0f172a"/>
  <rect x="736" y="90" width="36" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="754" y="101" text-anchor="middle" class="mono" fill="#ffffff">STEP 5</text>
  <text x="794" y="128" text-anchor="middle" class="body" fill="#ffffff">Data</text>
  <text x="794" y="146" text-anchor="middle" class="body" fill="#ffffff">Exfiltration</text>
  <text x="794" y="166" text-anchor="middle" class="sub" fill="#ffffff">All records forwarded</text>
  <text x="794" y="182" text-anchor="middle" class="sub" fill="#ffffff">to attacker endpoint</text>
  <text x="794" y="216" text-anchor="middle" class="mono" fill="#64748b">DATA OPERATIONS</text>

  <!-- KEY INSIGHT CALLOUT -->
  <rect x="36" y="248" width="828" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="274" text-anchor="middle" class="body" fill="#0f172a">Key insight: The payload is text, not code</text>
  <text x="450" y="292" text-anchor="middle" class="sub" fill="#334155">No malware. No CVE. No suspicious traffic. Standard security tooling has no mechanism to flag it.</text>

  <!-- LEGEND -->
  <line x1="36" y1="332" x2="864" y2="332" stroke="#f1f5f9" stroke-width="1"/>
  <text x="36" y="350" class="mono" fill="#64748b">LEGEND</text>
  <rect x="108" y="340" width="12" height="12" rx="2" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="128" y="350" class="legend" fill="#334155">Standard step</text>
  <rect x="256" y="340" width="12" height="12" rx="2" fill="#0f172a"/>
  <text x="276" y="350" class="legend" fill="#334155">Focal node</text>
  <line x1="376" y1="346" x2="392" y2="346" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="392,343 398,346 392,349" fill="#c2410c"/>
  <text x="408" y="350" class="legend" fill="#334155">Threat path</text>

  <!-- CAPTION -->
  <text x="450" y="496" text-anchor="middle" class="caption" fill="#64748b">No single-layer control addresses the full chain. Source: MCP attack chain analysis.</text>
</svg>
