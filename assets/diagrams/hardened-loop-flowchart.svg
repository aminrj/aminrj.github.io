  <!-- Arrow up (loop back) -->
  <path
     d="m 559.67167,522.2711 c -48.90756,0 -55.35188,-107.79832 -23.51633,-306.0823 15.74786,-98.08373 -33.06439,-101.78158 -96.15553,-106.18857"
     stroke="#64748b"
     stroke-width="1.51023"
     stroke-dasharray="5, 4"
     id="path18"
     style="fill:none"
     sodipodi:nodetypes="csc" />
  <polygon
