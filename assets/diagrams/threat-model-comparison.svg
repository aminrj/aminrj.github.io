<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570" width="900" height="570">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');

    :root {
      --bg: #ffffff;
      --bg-subtle: #f8fafc;
      --border: #e2e8f0;
      --border-subtle: #f1f5f9;
      --text: #0f172a;
      --text-secondary: #334155;
      --text-muted: #94a3b8;
      --accent: #0f172a;
      --accent-secondary: #2563eb;
      --accent-green: #059669;
      --text-on-accent: #ffffff;
      --text-on-bg-subtle: #0f172a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --bg-subtle: #1e293b;
        --border: #334155;
        --border-subtle: #1e293b;
        --text: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #64748b;
        --accent: #f1f5f9;
        --accent-secondary: #60a5fa;
        --accent-green: #34d399;
        --text-on-accent: #0f172a;
        --text-on-bg-subtle: #f1f5f9;
      }
    }

    .title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; fill: var(--text); }
    .header { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; fill: var(--text-secondary); letter-spacing: 0.8px; text-transform: uppercase; }
    .body { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; fill: var(--text); }
    .body-sm { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; fill: var(--text-muted); }
    .caption { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; fill: var(--text-muted); }
    .label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 500; fill: var(--text-secondary); }
  </style>

  <rect width="900" height="570" fill="var(--bg)"/>

  <!-- Title -->
  <text x="450" y="40" class="title" text-anchor="middle">The Structure of the Threat Model Changes, Not Just the Threats</text>
  <line x1="120" y1="56" x2="780" y2="56" stroke="var(--border-subtle)" stroke-width="1"/>

  <!-- Divider between columns -->
  <line x1="450" y1="68" x2="450" y2="520" stroke="var(--border-subtle)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Column headers -->
  <rect x="50" y="78" width="340" height="28" rx="6" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="220" y="97" class="header" text-anchor="middle">Traditional Threat Model</text>

  <rect x="510" y="78" width="340" height="28" rx="6" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="680" y="97" class="header" text-anchor="middle">Agentic Threat Model</text>

  <!-- ========== LEFT: TRADITIONAL ========== -->

  <!-- Network box -->
  <rect x="60" y="118" width="140" height="36" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="130" y="141" class="body" text-anchor="middle">Network</text>

  <!-- Source Code box -->
  <rect x="60" y="170" width="140" height="36" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="130" y="193" class="body" text-anchor="middle">Source Code</text>

  <!-- Arrows to Application (curved, left to right) -->
  <path d="M 200 136 Q 235 142 265 152" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="260,148 270,152 260,156" fill="var(--accent)"/>

  <path d="M 200 186 Q 235 178 265 164" fill="none" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="260,166 270,162 260,158" fill="var(--accent)"/>

  <!-- Application box (filled, key element) -->
  <rect x="265" y="144" width="110" height="64" rx="6" fill="var(--accent)"/>
  <text x="320" y="170" class="body" text-anchor="middle" fill="var(--text-on-accent)">Application</text>
  <text x="320" y="188" class="body-sm" text-anchor="middle" fill="var(--text-muted)">Attack surface</text>

  <!-- Arrow down to Data -->
  <line x1="320" y1="208" x2="320" y2="234" stroke="var(--accent)" stroke-width="2"/>
  <polygon points="316,229 320,239 324,229" fill="var(--accent)"/>

  <!-- Data cylinder -->
  <ellipse cx="320" cy="264" rx="44" ry="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="276" y="264" width="88" height="30" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <ellipse cx="320" cy="294" rx="44" ry="12" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="320" y="284" class="body" text-anchor="middle">Data</text>

  <!-- Coverage note -->
  <rect x="70" y="320" width="320" height="48" rx="8" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="230" y="341" class="label" text-anchor="middle">Threat model covers 2 surfaces:</text>
  <text x="230" y="359" class="body" text-anchor="middle">Network plus Source Code</text>

  <!-- ========== RIGHT: AGENTIC ========== -->

  <!-- 7 layers, top to bottom flow -->
  <!-- Layer 1: Foundation Models (darkest, top) -->
  <rect x="510" y="118" width="320" height="34" rx="6" fill="var(--accent)"/>
  <text x="670" y="140" class="body" text-anchor="middle" fill="var(--text-on-accent)">Foundation Models</text>

  <!-- Arrow down -->
  <line x1="670" y1="152" x2="670" y2="162" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,158 670,166 674,158" fill="var(--text-muted)"/>

  <!-- Layer 2: Data Operations -->
  <rect x="510" y="162" width="320" height="34" rx="6" fill="var(--text-secondary)"/>
  <text x="670" y="184" class="body" text-anchor="middle" fill="var(--text-on-accent)">Data Operations</text>

  <line x1="670" y1="196" x2="670" y2="206" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,202 670,210 674,202" fill="var(--text-muted)"/>

  <!-- Layer 3: Agent Frameworks -->
  <rect x="510" y="206" width="320" height="34" rx="6" fill="var(--border)"/>
  <text x="670" y="228" class="body" text-anchor="middle">Agent Frameworks</text>

  <line x1="670" y1="240" x2="670" y2="250" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,246 670,254 674,246" fill="var(--text-muted)"/>

  <!-- Layer 4: Deployment Infrastructure -->
  <rect x="510" y="250" width="320" height="34" rx="6" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="670" y="272" class="body" text-anchor="middle">Deployment Infrastructure</text>

  <line x1="670" y1="284" x2="670" y2="294" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,290 670,298 674,290" fill="var(--text-muted)"/>

  <!-- Layer 5: Evaluation &amp; Observability -->
  <rect x="510" y="294" width="320" height="34" rx="6" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="670" y="316" class="body" text-anchor="middle">Evaluation &amp; Observability</text>

  <line x1="670" y1="328" x2="670" y2="338" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,334 670,342 674,334" fill="var(--text-muted)"/>

  <!-- Layer 6: Security &amp; Compliance -->
  <rect x="510" y="338" width="320" height="34" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="670" y="360" class="body" text-anchor="middle">Security &amp; Compliance</text>

  <line x1="670" y1="372" x2="670" y2="382" stroke="var(--text-muted)" stroke-width="1.5"/>
  <polygon points="666,378 670,386 674,378" fill="var(--text-muted)"/>

  <!-- Layer 7: Agent Ecosystem (lightest, bottom) -->
  <rect x="510" y="382" width="320" height="34" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="670" y="404" class="body" text-anchor="middle">Agent Ecosystem</text>

  <!-- Feedback loop (curved, on the left side of the stack) -->
  <path d="M 510 399 Q 460 399 460 135 Q 460 135 510 152" fill="none" stroke="var(--accent-green)" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="505,148 513,152 505,156" fill="var(--accent-green)"/>

  <!-- Feedback label -->
  <rect x="410" y="260" width="76" height="40" rx="8" fill="var(--bg-subtle)" stroke="var(--accent-green)" stroke-width="1"/>
  <text x="448" y="278" class="label" text-anchor="middle" fill="var(--accent-green)">Cross-layer</text>
  <text x="448" y="292" class="label" text-anchor="middle" fill="var(--accent-green)">attack paths</text>

  <!-- Coverage note -->
  <rect x="520" y="435" width="320" height="48" rx="8" fill="var(--bg-subtle)" stroke="var(--border)" stroke-width="1"/>
  <text x="680" y="456" class="label" text-anchor="middle">Threat model covers 7 interacting layers</text>
  <text x="680" y="474" class="body" text-anchor="middle">Plus cross-layer attack paths</text>

  <!-- Caption -->
  <text x="450" y="520" class="caption" text-anchor="middle">The feedback loop from Agent Ecosystem back to Foundation Models captures how threats propagate through the entire stack.</text>
</svg>
