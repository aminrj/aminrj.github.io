<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 800 480"
   width="800"
   height="480"
   version="1.1"
   id="svg21"
   sodipodi:docname="local-vs-cloud-loop.svg"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs21" />
  <sodipodi:namedview
     id="namedview21"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="3.93125"
     inkscape:cx="399.87281"
     inkscape:cy="240"
     inkscape:window-width="3840"
     inkscape:window-height="2126"
     inkscape:window-x="1609"
     inkscape:window-y="-11"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg21" />
  <style
     id="style1">
    .title { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; }
    .header { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
    .body { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; }
    .sub { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
    .caption { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
  </style>
  <rect
     width="800"
     height="400"
     fill="#ffffff"
     id="rect1" />
  <text
     x="400"
     y="36"
     class="title"
     fill="#0f172a"
     text-anchor="middle"
     id="text1">Local vs Cloud for Loop Engineering</text>
  <line
     x1="120"
     y1="52"
     x2="680"
     y2="52"
     stroke="#f1f5f9"
     stroke-width="1"
     id="line1" />
  <!-- Divider -->
  <line
     x1="400"
     y1="60"
     x2="400"
     y2="360"
     stroke="#f1f5f9"
     stroke-width="1"
     stroke-dasharray="8,6"
     id="line2" />
  <!-- LEFT: Cloud -->
  <text
     x="200"
     y="80"
     class="header"
     fill="#64748b"
     text-anchor="middle"
     id="text2">Cloud API</text>
  <rect
     x="80"
     y="100"
     width="240"
     height="240"
     rx="8"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect2" />
  <!-- Cost -->
  <rect
     x="100"
     y="116"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect3" />
  <text
     x="200"
     y="141"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text3">Cost per iteration</text>
  <text
     x="126"
     y="155"
     class="sub"
     fill="#64748b"
     id="text4">Watching the meter anxiously</text>
  <!-- Privacy -->
  <rect
     x="100"
     y="168"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect4" />
  <text
     x="200"
     y="193"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text5">Code leaves your network</text>
  <text
     x="126"
     y="207"
     class="sub"
     fill="#64748b"
     id="text6">Every iteration sends your repo</text>
  <!-- Unattended -->
  <rect
     x="100"
     y="220"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect6" />
  <text
     x="200"
     y="245"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text7">Unattended runs</text>
  <text
     x="126"
     y="259"
     class="sub"
     fill="#64748b"
     id="text8">Need dollar caps as safety</text>
  <!-- Capability -->
  <rect
     x="100"
     y="272"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect8" />
  <text
     x="200"
     y="297"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text9">Model capability</text>
  <text
     x="126"
     y="311"
     class="sub"
     fill="#64748b"
     id="text10">Best-in-class frontier models</text>
  <!-- RIGHT: Local -->
  <text
     x="600"
     y="80"
     class="header"
     fill="#64748b"
     text-anchor="middle"
     id="text11">Local GPU</text>
  <rect
     x="480"
     y="100"
     width="240"
     height="240"
     rx="8"
     fill="#ffffff"
     stroke="#059669"
     stroke-width="1.5"
     id="rect11" />
  <!-- Cost -->
  <rect
     x="500"
     y="116"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#059669"
     stroke-width="1.5"
     id="rect12" />
  <text
     x="600"
     y="141"
     class="body"
     fill="#059669"
     text-anchor="middle"
     id="text12">Near-zero marginal cost</text>
  <text
     x="540"
     y="157"
     class="sub"
     fill="#64748b"
     id="text13">Only electricity matters</text>
  <!-- Privacy -->
  <rect
     x="500"
     y="168"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#059669"
     stroke-width="1.5"
     id="rect13" />
  <text
     x="600"
     y="193"
     class="body"
     fill="#059669"
     text-anchor="middle"
     id="text14">Code never leaves LAN</text>
  <text
     x="540"
     y="209"
     class="sub"
     fill="#64748b"
     id="text15">Air-gapped work is allowed</text>
  <!-- Unattended -->
  <rect
     x="500"
     y="220"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#059669"
     stroke-width="1.5"
     id="rect15" />
  <text
     x="600"
     y="245"
     class="body"
     fill="#059669"
     text-anchor="middle"
     id="text16">Run while you sleep</text>
  <text
     x="540"
     y="261"
     class="sub"
     fill="#64748b"
     id="text17">No meter anxiety</text>
  <!-- Capability -->
  <rect
     x="500"
     y="272"
     width="200"
     height="48"
     rx="6"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect17" />
  <text
     x="600"
     y="297"
     class="body"
     fill="#334155"
     text-anchor="middle"
     id="text18">Slower, less capable</text>
  <text
     x="540"
     y="313"
     class="sub"
     fill="#64748b"
     id="text19">27B-35B quantized models</text>
  <!-- Bottom: recommendation -->
  <rect
     x="100"
     y="404"
     width="600"
     height="36"
     rx="8"
     fill="#f8fafc"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect19" />
  <text
     x="404.5787"
     y="425.48013"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text20">Best pattern: 60-80% local workhorse, escalate hard 20% to cloud</text>
  <!-- Caption -->
  <text
     x="400"
     y="464"
     class="caption"
     fill="#64748b"
     text-anchor="middle"
     id="text21">Local removes cost and privacy as constraints. The trade-off is speed and capability, which the hybrid pattern addresses directly.</text>
</svg>
