<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680">
  <style>
    .title  { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; fill:#0f172a; }
    .header { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:600; fill:#334155; letter-spacing:0.5px; }
    .body   { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; fill:#0f172a; }
    .sub    { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; fill:#64748b; }
    .result { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; font-weight:600; fill:#0f172a; }
    .caption{ font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; fill:#64748b; }
  </style>

  <rect width="1000" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="36" class="title" text-anchor="middle">Which AI Security Framework?</text>
  <line x1="180" y1="52" x2="820" y2="52" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ============================================================
       ROOT: Who is asking?
       Dark fill — white text must use style="fill:#ffffff" to
       override the CSS class fill. Attribute fill="#fff" loses to
       class-based fill in SVG's cascade.
       ============================================================ -->
  <rect x="400" y="68" width="200" height="42" rx="8" fill="#0f172a"/>
  <text x="500" y="94" class="body" style="fill:#ffffff" text-anchor="middle">Who is asking?</text>

  <!-- Root drops to horizontal branch connector at y=134 -->
  <line x1="500" y1="110" x2="500" y2="134" stroke="#0f172a" stroke-width="2"/>
  <!-- Horizontal spanning Board (x=140) to Red Team (x=870) -->
  <line x1="140" y1="134" x2="870" y2="134" stroke="#0f172a" stroke-width="2"/>
  <!-- Short stubs down to each branch box -->
  <line x1="140" y1="134" x2="140" y2="148" stroke="#0f172a" stroke-width="2"/>
  <line x1="870" y1="134" x2="870" y2="148" stroke="#0f172a" stroke-width="2"/>
  <!-- center branch already inline with root vertical -->

  <!-- ============================================================
       BRANCH 1: Board / Regulators   (center x=140)
       Board result right edge: x=230   Agentic left edge: x=242 — 12px gap
       ============================================================ -->
  <rect x="50" y="148" width="180" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="140" y="169" class="body" text-anchor="middle">Board / Regulators</text>
  <text x="140" y="186" class="sub" text-anchor="middle">Governance, compliance</text>

  <line x1="140" y1="200" x2="140" y2="220" stroke="#0f172a" stroke-width="2"/>
  <polygon points="136,216 144,216 140,224" fill="#0f172a"/>

  <!-- Result box — y=224-260, right edge x=230 -->
  <rect x="50" y="224" width="180" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="247" class="result" text-anchor="middle">NIST AI RMF + ISO 42001</text>

  <!-- ============================================================
       BRANCH 2: Security Team   (center x=500)
       Sub-branches start at y=266, which is 6px below Board result
       bottom (y=260) so elements at different y-levels never overlap.
       Sub-branch centers: 322 / 500 / 678  (spacing 178px each)
       Each sub-box is 160px wide with 18px gap between boxes.
       ============================================================ -->
  <rect x="400" y="148" width="200" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="500" y="169" class="body" text-anchor="middle">Security Team</text>
  <text x="500" y="186" class="sub" text-anchor="middle">What are you building?</text>

  <!-- Security to sub-branch horizontal connector at y=248 -->
  <line x1="500" y1="200" x2="500" y2="248" stroke="#0f172a" stroke-width="2"/>
  <line x1="322" y1="248" x2="678" y2="248" stroke="#0f172a" stroke-width="2"/>
  <line x1="322" y1="248" x2="322" y2="266" stroke="#0f172a" stroke-width="2"/>
  <line x1="678" y1="248" x2="678" y2="266" stroke="#0f172a" stroke-width="2"/>
  <!-- center: y=200-266 already drawn as part of Security vertical -->

  <!-- 2a: Agentic System (center x=322, box x=242-402) -->
  <rect x="242" y="266" width="160" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="322" y="287" class="body" text-anchor="middle">Agentic System</text>
  <text x="322" y="304" class="sub" text-anchor="middle">MCP, multi-step</text>

  <line x1="322" y1="318" x2="322" y2="336" stroke="#0f172a" stroke-width="2"/>
  <polygon points="318,332 326,332 322,340" fill="#0f172a"/>

  <rect x="250" y="340" width="144" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="322" y="362" class="result" text-anchor="middle">MAESTRO</text>

  <!-- 2b: Standalone LLM (center x=500, box x=420-580) -->
  <rect x="420" y="266" width="160" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="500" y="287" class="body" text-anchor="middle">Standalone LLM</text>
  <text x="500" y="304" class="sub" text-anchor="middle">Chat, RAG, single-step</text>

  <line x1="500" y1="318" x2="500" y2="336" stroke="#0f172a" stroke-width="2"/>
  <polygon points="496,332 504,332 500,340" fill="#0f172a"/>

  <rect x="428" y="340" width="144" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="362" class="result" text-anchor="middle">STRIDE-AI</text>

  <!-- 2c: Regulated Industry (center x=678, box x=598-758) -->
  <rect x="598" y="266" width="160" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="678" y="287" class="body" text-anchor="middle">Regulated Industry</text>
  <text x="678" y="304" class="sub" text-anchor="middle">Finance, healthcare, gov</text>

  <line x1="678" y1="318" x2="678" y2="336" stroke="#0f172a" stroke-width="2"/>
  <polygon points="674,332 682,332 678,340" fill="#0f172a"/>

  <!-- Result right edge x=758; Red Team box left edge x=770 — 12px gap -->
  <rect x="606" y="340" width="144" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="678" y="362" class="result" text-anchor="middle">STRIDE-AI + NIST</text>

  <!-- ============================================================
       BRANCH 3: Red Team   (center x=870, box x=770-970)
       ============================================================ -->
  <rect x="770" y="148" width="200" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="870" y="169" class="body" text-anchor="middle">Red Team</text>
  <text x="870" y="186" class="sub" text-anchor="middle">Attack simulation</text>

  <line x1="870" y1="200" x2="870" y2="220" stroke="#0f172a" stroke-width="2"/>
  <polygon points="866,216 874,216 870,224" fill="#0f172a"/>

  <!-- Red Team result y=224-260; sub-branches start y=266 — 6px vertical gap -->
  <rect x="778" y="224" width="184" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="247" class="result" text-anchor="middle">MAESTRO + MITRE ATLAS</text>

  <!-- Enterprise Sales continues below via dashed line -->
  <line x1="870" y1="260" x2="870" y2="390" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Enterprise Sales box y=390-442; sub-branch results end at y=374 — 16px vertical gap -->
  <rect x="770" y="390" width="200" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="870" y="411" class="body" text-anchor="middle">Enterprise Sales</text>
  <text x="870" y="428" class="sub" text-anchor="middle">Selling to regulated buyers</text>

  <line x1="870" y1="442" x2="870" y2="460" stroke="#0f172a" stroke-width="2"/>
  <polygon points="866,456 874,456 870,464" fill="#0f172a"/>

  <rect x="790" y="464" width="160" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="486" class="result" text-anchor="middle">ISO 42001</text>

  <!-- ============================================================
       Security Maturity (below all branches)
       Starts at y=530 — 30px below ISO 42001 result bottom (y=498)
       ============================================================ -->
  <rect x="70" y="530" width="760" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="553" class="header" text-anchor="middle">ALSO CONSIDER: YOUR SECURITY MATURITY</text>

  <line x1="450" y1="566" x2="450" y2="580" stroke="#0f172a" stroke-width="2"/>
  <polygon points="446,576 454,576 450,584" fill="#0f172a"/>

  <rect x="70" y="584" width="760" height="68" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="90" y="608" class="body">No existing process</text>
  <text x="90" y="625" class="sub">Start with MAESTRO</text>

  <line x1="330" y1="596" x2="330" y2="630" stroke="#e2e8f0" stroke-width="1"/>

  <text x="350" y="608" class="body">Existing STRIDE SDL</text>
  <text x="350" y="625" class="sub">Extend with STRIDE-AI</text>

  <line x1="590" y1="596" x2="590" y2="630" stroke="#e2e8f0" stroke-width="1"/>

  <text x="610" y="608" class="body">Compliance-driven</text>
  <text x="610" y="625" class="sub">NIST AI RMF first</text>

  <!-- Caption -->
  <text x="500" y="666" class="caption" text-anchor="middle">Pick the framework that matches your current question. Add layers only when you need what each one specifically provides.</text>
</svg>
