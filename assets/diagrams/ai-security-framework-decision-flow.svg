<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720">
  <style>
    .title { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
    .header { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #334155; letter-spacing: 0.5px; text-transform: uppercase; }
    .body { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #0f172a; }
    .caption { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #64748b; }
    .tag { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 500; fill: #64748b; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>

  <rect width="800" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" class="title" text-anchor="middle">Which AI Security Framework?</text>
  <line x1="140" y1="52" x2="660" y2="52" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ROOT NODE -->
  <rect x="300" y="70" width="200" height="40" rx="8" fill="#0f172a"/>
  <text x="400" y="95" class="body" text-anchor="middle" fill="#ffffff">Who is asking?</text>

  <!-- ARROW DOWN -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#0f172a" stroke-width="2"/>
  <polygon points="396,136 404,136 400,144" fill="#0f172a"/>

  <!-- BRANCH 1: Board/Regulators -->
  <line x1="400" y1="140" x2="200" y2="140" stroke="#0f172a" stroke-width="2"/>
  <line x1="200" y1="140" x2="200" y2="170" stroke="#0f172a" stroke-width="2"/>

  <rect x="80" y="170" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="200" y="188" class="body" text-anchor="middle">Board / Regulators</text>
  <text x="200" y="206" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">Governance and compliance</text>

  <line x1="200" y1="214" x2="200" y2="240" stroke="#0f172a" stroke-width="2"/>
  <polygon points="196,236 204,236 200,244" fill="#0f172a"/>

  <rect x="100" y="240" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="263" class="body" text-anchor="middle">NIST AI RMF + ISO 42001</text>

  <!-- BRANCH 2: Security Team -->
  <line x1="400" y1="140" x2="400" y2="170" stroke="#0f172a" stroke-width="2"/>

  <rect x="280" y="170" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="188" class="body" text-anchor="middle">Security Team</text>
  <text x="400" y="206" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">What are you building?</text>

  <!-- ARROW DOWN -->
  <line x1="400" y1="214" x2="400" y2="240" stroke="#0f172a" stroke-width="2"/>
  <polygon points="396,236 404,236 400,244" fill="#0f172a"/>

  <!-- SUB-BRANCH 2a: Agentic System -->
  <line x1="400" y1="240" x2="280" y2="240" stroke="#0f172a" stroke-width="2"/>
  <line x1="280" y1="240" x2="280" y2="270" stroke="#0f172a" stroke-width="2"/>

  <rect x="160" y="270" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="280" y="288" class="body" text-anchor="middle">Agentic System</text>
  <text x="280" y="306" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">MCP, multi-step, autonomous</text>

  <line x1="280" y1="314" x2="280" y2="340" stroke="#0f172a" stroke-width="2"/>
  <polygon points="276,336 284,336 280,344" fill="#0f172a"/>

  <rect x="180" y="340" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="363" class="body" text-anchor="middle">MAESTRO</text>

  <!-- SUB-BRANCH 2b: Standalone LLM -->
  <line x1="400" y1="240" x2="400" y2="270" stroke="#0f172a" stroke-width="2"/>

  <rect x="280" y="270" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="288" class="body" text-anchor="middle">Standalone LLM</text>
  <text x="400" y="306" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">Chat, RAG, single-step</text>

  <line x1="400" y1="314" x2="400" y2="340" stroke="#0f172a" stroke-width="2"/>
  <polygon points="396,336 404,336 400,344" fill="#0f172a"/>

  <rect x="300" y="340" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="363" class="body" text-anchor="middle">STRIDE-AI</text>

  <!-- SUB-BRANCH 2c: Regulated Industry -->
  <line x1="400" y1="240" x2="520" y2="240" stroke="#0f172a" stroke-width="2"/>
  <line x1="520" y1="240" x2="520" y2="270" stroke="#0f172a" stroke-width="2"/>

  <rect x="400" y="270" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="520" y="288" class="body" text-anchor="middle">Regulated Industry</text>
  <text x="520" y="306" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">Finance, healthcare, gov</text>

  <line x1="520" y1="314" x2="520" y2="340" stroke="#0f172a" stroke-width="2"/>
  <polygon points="516,336 524,336 520,344" fill="#0f172a"/>

  <rect x="420" y="340" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="520" y="363" class="body" text-anchor="middle">STRIDE-AI + NIST</text>

  <!-- BRANCH 3: Red Team -->
  <line x1="400" y1="140" x2="600" y2="140" stroke="#0f172a" stroke-width="2"/>
  <line x1="600" y1="140" x2="600" y2="170" stroke="#0f172a" stroke-width="2"/>

  <rect x="480" y="170" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="600" y="188" class="body" text-anchor="middle">Red Team</text>
  <text x="600" y="206" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">Attack simulation</text>

  <line x1="600" y1="214" x2="600" y2="240" stroke="#0f172a" stroke-width="2"/>
  <polygon points="596,236 604,236 600,244" fill="#0f172a"/>

  <rect x="500" y="240" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="263" class="body" text-anchor="middle">MAESTRO + MITRE ATLAS</text>

  <!-- BRANCH 4: Enterprise Sales -->
  <line x1="600" y1="240" x2="600" y2="370" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="480" y="370" width="240" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="600" y="388" class="body" text-anchor="middle">Enterprise Sales</text>
  <text x="600" y="406" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b" text-anchor="middle">Selling to regulated buyers</text>

  <line x1="600" y1="414" x2="600" y2="440" stroke="#0f172a" stroke-width="2"/>
  <polygon points="596,436 604,436 600,444" fill="#0f172a"/>

  <rect x="500" y="440" width="200" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="463" class="body" text-anchor="middle">ISO 42001</text>

  <!-- Bottom section: Security Maturity -->
  <rect x="140" y="510" width="520" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="533" class="header" text-anchor="middle">Also consider: your current security maturity</text>

  <line x1="400" y1="546" x2="400" y2="570" stroke="#0f172a" stroke-width="2"/>
  <polygon points="396,566 404,566 400,574" fill="#0f172a"/>

  <!-- Maturity row -->
  <rect x="140" y="574" width="520" height="80" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="160" y="598" class="body">No existing process</text>
  <text x="160" y="618" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b">Start with MAESTRO</text>

  <line x1="320" y1="590" x2="320" y2="610" stroke="#e2e8f0" stroke-width="1"/>

  <text x="340" y="598" class="body">Existing STRIDE SDL</text>
  <text x="340" y="618" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b">Extend with STRIDE-AI</text>

  <line x1="500" y1="590" x2="500" y2="610" stroke="#e2e8f0" stroke-width="1"/>

  <text x="520" y="598" class="body">Compliance-driven</text>
  <text x="520" y="618" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11px" font-weight="400" fill="#64748b">NIST AI RMF first</text>

  <!-- Caption -->
  <text x="400" y="690" class="caption" text-anchor="middle">Pick one framework that matches the question you are asking right now. Add the next layer when you need what it specifically provides.</text>
</svg>
