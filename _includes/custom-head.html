<!-- Newsletter styles (standalone file – not subject to compress layout stripping) -->
<link rel="stylesheet" href="{{ '/assets/css/newsletter.css' | relative_url }}">

<!-- Beehiiv subscribe embed -->
<script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>

<!-- GoatCounter: page views (auto) + custom events -->
<script data-goatcounter="https://aminrj.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
  // Safe wrapper: GoatCounter loads deferred, so we queue events fired before it's ready
  function _gc(path, title) {
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({ path: path, title: title, event: true });
    } else {
      // Script not yet loaded — retry once after a short delay
      setTimeout(function() {
        if (window.goatcounter && window.goatcounter.count) {
          window.goatcounter.count({ path: path, title: title, event: true });
        }
      }, 1500);
    }
  }

  // Track newsletter signups
  function trackNewsletterSignup() {
    _gc('event-newsletter-signup', 'Newsletter Signup');
  }

  // Track consultation CTA clicks
  function trackConsultationClick() {
    _gc('event-consultation-click', 'Consultation Click');
  }

  // Track social media clicks
  function trackSocialClick(platform) {
    _gc('event-social-' + platform, 'Social Click: ' + platform);
  }

  // Track resource downloads
  function trackDownload(resource) {
    _gc('event-download-' + resource, 'Download: ' + resource);
  }
</script>
