<!-- Image lightbox: replaces Chirpy's GLightbox with a simple overlay that
     doesn't have the stuck-spinner bug. Intercepts .popup clicks at window
     capture phase (fires before GLightbox's element-level handlers). -->
<script>
  (function () {
    var _lightboxOverlay = null;

    function openImageOverlay(href, alt) {
      if (_lightboxOverlay) return;

      var overlay = document.createElement('div');
      overlay.style.cssText = [
        'position:fixed', 'top:0', 'right:0', 'bottom:0', 'left:0', 'z-index:9999',
        'background:rgba(0,0,0,.92)',
        'display:flex', 'align-items:center', 'justify-content:center',
        'cursor:zoom-out'
      ].join(';');
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-modal', 'true');

      var img = document.createElement('img');
      img.style.cssText = [
        'max-width:90vw', 'max-height:90vh',
        'object-fit:contain', 'cursor:default',
        'border-radius:3px', 'box-shadow:0 4px 32px rgba(0,0,0,.6)'
      ].join(';');
      img.alt = alt || '';
      img.src = href;

      var closeBtn = document.createElement('button');
      closeBtn.innerHTML = '&times;';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.style.cssText = [
        'position:absolute', 'top:12px', 'right:16px',
        'background:none', 'border:none', 'color:#fff',
        'font-size:2.5rem', 'line-height:1', 'cursor:pointer', 'opacity:.8'
      ].join(';');

      overlay.appendChild(closeBtn);
      overlay.appendChild(img);
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';
      _lightboxOverlay = overlay;

      function dismiss() {
        if (!_lightboxOverlay) return;
        document.body.removeChild(_lightboxOverlay);
        document.body.style.overflow = '';
        document.removeEventListener('keydown', onKey);
        _lightboxOverlay = null;
      }
      function onKey(e) { if (e.key === 'Escape') dismiss(); }

      closeBtn.addEventListener('click', dismiss);
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) dismiss();
      });
      document.addEventListener('keydown', onKey);
    }

    document.addEventListener('DOMContentLoaded', function () {
      window.addEventListener('click', function (e) {
        var a = e.target.closest('a.popup');
        if (!a) return;
        var href = a.getAttribute('href');
        if (!href) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        var inner = a.querySelector('img');
        openImageOverlay(href, inner ? inner.alt : '');
      }, true); // capture phase — fires before GLightbox's element handlers
    });
  })();
</script>

<!-- GoatCounter: page views (auto) + custom events -->
<script data-goatcounter="https://aminrj.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
<script>
  // Safe wrapper: GoatCounter loads async, so queue events fired before it's ready
  function _gc(path, title) {
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({ path: path, title: title, event: true });
    } else {
      setTimeout(function() {
        if (window.goatcounter && window.goatcounter.count) {
          window.goatcounter.count({ path: path, title: title, event: true });
        }
      }, 1500);
    }
  }

  function trackNewsletterSignup() { _gc('event-newsletter-signup', 'Newsletter Signup'); }
  function trackConsultationClick() { _gc('event-consultation-click', 'Consultation Click'); }
  function trackSocialClick(platform) { _gc('event-social-' + platform, 'Social Click: ' + platform); }
  function trackDownload(resource) { _gc('event-download-' + resource, 'Download: ' + resource); }
</script>

<!-- Strip Chirpy popup/lightbox wrapper from cover images (resources page) -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.cover-img').forEach(function(img) {
      var a = img.closest('a.popup');
      if (a) {
        a.classList.remove('popup', 'img-link', 'shimmer');
        a.removeAttribute('href');
        a.style.cursor = 'default';
      }
    });
  });
</script>
