        </linearGradient>
    </defs>
    <rect width="600" height="400" fill="url(#bg)"/>
    <rect width="600" height="400" fill="url(#grid)"/>
    <rect x="0" y="0" width="600" height="4" fill="url(#accent-bar)"/>
    <circle cx="80" cy="120" r="36"
