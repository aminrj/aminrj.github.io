     inkscape:window-x="1609"
     inkscape:window-y="-11"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg19" />
  <style
     id="style1">
    .title { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; }
    .header { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
    .body { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; }
    .sub { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
    .caption { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
  </style>
  <rect
     width="800"
     height="520"
     fill="#ffffff"
     id="rect1" />
  <text
     x="400"
     y="36"
     class="title"
     fill="#0f172a"
     text-anchor="middle"
     id="text1">Local Loop Architecture</text>
  <line
     x1="120"
     y1="52"
     x2="680"
     y2="52"
     stroke="#f1f5f9"
     stroke-width="1"
     id="line1" />
  <!-- Local machine boundary -->
  <rect
     x="60"
     y="70"
     width="680"
     height="380"
     rx="12"
     fill="#f8fafc"
     stroke="#e2e8f0"
     stroke-width="1.5"
     stroke-dasharray="6,4"
     id="rect2" />
  <text
     x="70"
     y="92"
     class="header"
     fill="#64748b"
     id="text2">Local Machine</text>
  <!-- Layer 1: Trigger -->
  <rect
     x="100"
     y="110"
     width="600"
     height="56"
     rx="8"
     fill="#0f172a"
     id="rect3" />
  <text
     x="400"
     y="135"
     class="body"
     fill="#ffffff"
     text-anchor="middle"
     id="text3">Trigger (cron / webhook / manual command)</text>
  <text
     x="120"
     y="152"
     class="sub"
     fill="#94a3b8"
     id="text4">Starts the loop</text>
  <!-- Arrow down -->
  <line
     x1="400"
     y1="166"
     x2="400"
     y2="186"
     stroke="#0f172a"
     stroke-width="2"
     id="line4" />
  <polygon
     points="400,190 396,182 404,182"
     fill="#0f172a"
     id="polygon4" />
  <!-- Layer 2: Loop Controller -->
  <rect
     x="100"
     y="190"
     width="600"
     height="80"
     rx="8"
     fill="#ffffff"
     stroke="#0f172a"
     stroke-width="2"
     id="rect4" />
  <text
     x="400"
     y="215"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text5">Loop Controller (bash script)</text>
  <text
     x="120"
     y="240"
     class="sub"
     fill="#334155"
     id="text6">Iteration cap + no-progress detection + git commit + failure feedback</text>
  <text
     x="120"
     y="258"
     class="sub"
     fill="#334155"
     id="text7">Fresh agent process every iteration. State lives in filesystem, not context.</text>
  <!-- Arrow down -->
  <line
     x1="400"
     y1="270"
     x2="400"
     y2="290"
     stroke="#0f172a"
     stroke-width="2"
     id="line7" />
  <polygon
     points="400,294 396,286 404,286"
     fill="#0f172a"
     id="polygon7" />
  <!-- Layer 3: Agent -->
  <rect
     x="100"
     y="294"
     width="280"
     height="60"
     rx="8"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect7" />
  <text
     x="240"
     y="318"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text8">Coding Agent (OpenCode)</text>
  <text
     x="120"
     y="340"
     class="sub"
     fill="#334155"
     id="text9">Reads TASK.md + skill files</text>
  <!-- Arrow from Agent to Inference -->
  <line
     x1="380"
     y1="324"
     x2="420"
     y2="324"
     stroke="#0f172a"
     stroke-width="2"
     id="line9" />
  <polygon
     points="424,324 416,319 416,329"
     fill="#0f172a"
     id="polygon9" />
  <text
     x="400"
     y="316"
     class="sub"
     fill="#64748b"
     text-anchor="middle"
     id="text10">OpenAI-compatible</text>
  <!-- Layer 3b: Inference Server -->
  <rect
     x="420"
     y="294"
     width="280"
     height="60"
     rx="8"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect10" />
  <text
     x="560"
     y="318"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text11">llama.cpp (llama-server)</text>
  <text
     x="440"
     y="340"
     class="sub"
     fill="#334155"
     id="text12">Local GPU endpoint</text>
  <!-- Arrow down from Agent -->
  <line
     x1="240"
     y1="354"
     x2="240"
     y2="374"
     stroke="#0f172a"
     stroke-width="2"
     id="line12" />
  <polygon
     points="240,378 236,370 244,370"
     fill="#0f172a"
     id="polygon12" />
  <!-- Layer 4: Verification -->
  <rect
     x="100"
     y="378"
     width="280"
     height="56"
     rx="8"
     fill="#ffffff"
     stroke="#059669"
     stroke-width="1.5"
     id="rect12" />
  <text
     x="240"
     y="401"
     class="body"
     fill="#059669"
     text-anchor="middle"
     id="text13">Verification (npm test + typecheck)</text>
  <text
     x="120"
     y="422"
     class="sub"
     fill="#334155"
     id="text14">The machine decides, not the agent</text>
  <!-- Arrow down from Inference -->
  <line
     x1="560"
     y1="354"
     x2="560"
     y2="374"
     stroke="#0f172a"
     stroke-width="2"
     id="line14" />
  <polygon
     points="560,378 556,370 564,370"
     fill="#0f172a"
     id="polygon14" />
  <!-- Layer 4b: Filesystem -->
  <rect
     x="420"
     y="378"
     width="280"
     height="56"
     rx="8"
     fill="#ffffff"
     stroke="#e2e8f0"
     stroke-width="1.5"
     id="rect14" />
  <text
     x="560"
     y="401"
     class="body"
     fill="#0f172a"
     text-anchor="middle"
     id="text15">Filesystem (git + TASK.md)</text>
  <text
     x="440"
     y="422"
     class="sub"
     fill="#334155"
     id="text16">State persists between iterations</text>
  <!-- Arrow up from Verification to Loop Controller (success) -->
  <text
     x="140"
     y="290"
     class="sub"
     fill="#059669"
     id="text17">pass -&gt; stop</text>
  <!-- Arrow up from Filesystem to Loop Controller (failure) -->
  <text
     x="650"
     y="290"
     class="sub"
     fill="#64748b"
     id="text18">fail -&gt; retry</text>
  <!-- Caption -->
  <text
     x="400"
     y="490"
     class="caption"
     fill="#64748b"
     text-anchor="middle"
     id="text19">Every iteration is a fresh agent process. State lives in git and files, not in the model context window. The verification gate is independent of the agent's opinion.</text>
</svg>
