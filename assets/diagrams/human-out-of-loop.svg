<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <style>
    .title { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:700; }
    .header { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
    .body { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; font-weight:500; }
    .sub { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
    .caption { font-family: -apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:11px; font-weight:400; }
  </style>

  <rect width="800" height="480" fill="#ffffff"/>

  <text x="400" y="36" class="title" fill="#0f172a" text-anchor="middle">Step 4 vs Step 5: Human in the Loop vs Human Out of the Loop</text>
  <line x1="120" y1="52" x2="680" y2="52" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Divider -->
  <line x1="400" y1="60" x2="400" y2="440" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- LEFT: Step 4 - Human in the Loop -->
  <text x="200" y="80" class="header" fill="#64748b" text-anchor="middle">Step 4: Human in the Loop</text>

  <!-- Agent box -->
  <rect x="80" y="100" width="240" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Agent node -->
  <rect x="120" y="120" width="160" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="200" y="143" class="body" fill="#0f172a" text-anchor="middle">Agent</text>

  <!-- Arrow down -->
  <line x1="200" y1="156" x2="200" y2="176" stroke="#0f172a" stroke-width="2"/>
  <polygon points="200,180 196,172 204,172" fill="#0f172a"/>

  <!-- Tests node -->
  <rect x="120" y="180" width="160" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="200" y="203" class="body" fill="#0f172a" text-anchor="middle">Run tests</text>

  <!-- Arrow down -->
  <line x1="200" y1="216" x2="200" y2="236" stroke="#0f172a" stroke-width="2"/>
  <polygon points="200,240 196,232 204,232" fill="#0f172a"/>

  <!-- Decision diamond (simplified as rect) -->
  <rect x="120" y="240" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="200" y="260" class="sub" fill="#334155" text-anchor="middle">Tests pass?</text>

  <!-- Yes arrow -->
  <line x1="200" y1="280" x2="200" y2="300" stroke="#059669" stroke-width="2"/>
  <polygon points="200,304 196,296 204,296" fill="#059669"/>
  <text x="210" y="294" class="sub" fill="#059669">yes</text>

  <!-- Done node -->
  <rect x="120" y="304" width="160" height="36" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="327" class="body" fill="#059669" text-anchor="middle">Done</text>

  <!-- No arrow (loop back through human) -->
  <path d="M 280 260 Q 340 260 340 200 Q 340 140 280 140" stroke="#0f172a" stroke-width="2" fill="none"/>
  <polygon points="276,140 284,135 284,145" fill="#0f172a"/>
  <text x="350" y="200" class="sub" fill="#64748b">no</text>

  <!-- Human node (outside agent box, interrupting the loop) -->
  <rect x="290" y="150" width="100" height="100" rx="8" fill="#0f172a"/>
  <text x="340" y="178" class="header" fill="#ffffff" text-anchor="middle">You</text>
  <text x="340" y="200" class="sub" fill="#cbd5e1" text-anchor="middle">Approve</text>
  <text x="340" y="220" class="sub" fill="#cbd5e1" text-anchor="middle">Answer</text>
  <text x="340" y="240" class="sub" fill="#cbd5e1" text-anchor="middle">Re-prompt</text>

  <!-- RIGHT: Step 5 - Human Out of the Loop -->
  <text x="600" y="80" class="header" fill="#64748b" text-anchor="middle">Step 5: Human Out of the Loop</text>

  <!-- Loop box -->
  <rect x="420" y="100" width="240" height="280" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="420" y="100" width="240" height="28" rx="8" fill="#0f172a"/>
  <text x="540" y="119" class="header" fill="#ffffff" text-anchor="middle">The Loop</text>

  <!-- Agent inside loop -->
  <rect x="460" y="140" width="160" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="540" y="163" class="body" fill="#0f172a" text-anchor="middle">Agent</text>

  <!-- Arrow down -->
  <line x1="540" y1="176" x2="540" y2="196" stroke="#0f172a" stroke-width="2"/>
  <polygon points="540,200 536,192 544,192" fill="#0f172a"/>

  <!-- Tests node -->
  <rect x="460" y="200" width="160" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="540" y="223" class="body" fill="#0f172a" text-anchor="middle">Run tests</text>

  <!-- Arrow down -->
  <line x1="540" y1="236" x2="540" y2="256" stroke="#0f172a" stroke-width="2"/>
  <polygon points="540,260 536,252 544,252" fill="#0f172a"/>

  <!-- Decision -->
  <rect x="460" y="260" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="540" y="280" class="sub" fill="#334155" text-anchor="middle">Tests pass?</text>

  <!-- Yes arrow -->
  <line x1="540" y1="300" x2="540" y2="320" stroke="#059669" stroke-width="2"/>
  <polygon points="540,324 536,316 544,316" fill="#059669"/>
  <text x="550" y="314" class="sub" fill="#059669">yes</text>

  <!-- Done node -->
  <rect x="460" y="324" width="160" height="36" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="540" y="347" class="body" fill="#059669" text-anchor="middle">Done</text>

  <!-- No arrow (auto loop back) -->
  <path d="M 620 280 Q 680 280 680 220 Q 680 160 620 160" stroke="#059669" stroke-width="2" fill="none"/>
  <polygon points="616,160 624,155 624,165" fill="#059669"/>
  <text x="690" y="220" class="sub" fill="#059669">auto</text>

  <!-- Human node (outside, only at the end) -->
  <rect x="420" y="370" width="240" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="540" y="395" class="body" fill="#334155" text-anchor="middle">You review the diff, approve PR</text>

  <!-- Caption -->
  <text x="400" y="450" class="caption" fill="#64748b" text-anchor="middle">In Step 4 you sit inside the loop, approving each pass. In Step 5 the loop carries failures forward on its own. You define the goal and review the result.</text>
</svg>
