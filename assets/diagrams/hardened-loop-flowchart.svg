     id="polygon10" />
  <text
     x="410"
     y="426"
     class="sub"
     fill="#059669"
     id="text11">yes</text>
  <!-- Success -->
  <rect
     x="320"
     y="434"
     width="160"
     height="40"
     rx="6"
     fill="#059669"
     id="rect11" />
  <text
     x="400"
     y="452"
     class="body"
     fill="#ffffff"
     text-anchor="middle"
