  <text
     x="400"
     y="468"
     class="sub"
     fill="#d1fae5"
     text-anchor="middle"
     id="text13">Goal met</text>
  <!-- NO path (right side) -->
  <line
     x1="480"
     y1="382"
     x2="560"
     y2="382"
